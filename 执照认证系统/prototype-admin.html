<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>执照管理系统 - 后台管理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#F5F7FA;color:#333;font-size:14px;min-width:1200px;}
button{cursor:pointer;border:none;outline:none;font-family:inherit;font-size:14px;background:none;}
input,select,textarea{outline:none;font-family:inherit;font-size:14px;}
a{text-decoration:none;color:#1677FF;}
:root{--blue:#1677FF;--green:#52C41A;--red:#FF4D4F;--yellow:#FAAD14;--orange:#FF8C00;--purple:#722ED1;--sidebar:#001529;--sidebar-w:220px;--header-h:48px;}

/* Sidebar */
.sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sidebar-w);background:var(--sidebar);color:#FFF;z-index:100;display:flex;flex-direction:column;overflow-y:auto;}
.sidebar::-webkit-scrollbar{width:0;}
.sidebar-logo{height:56px;display:flex;align-items:center;padding:0 20px;gap:10px;border-bottom:1px solid rgba(255,255,255,0.1);flex-shrink:0;}
.sidebar-logo svg{flex-shrink:0;}
.sidebar-logo span{font-size:16px;font-weight:600;white-space:nowrap;}
.sidebar-menu{padding:8px 0;flex:1;}
.menu-item{display:flex;align-items:center;padding:10px 20px;gap:10px;cursor:pointer;color:rgba(255,255,255,0.65);font-size:14px;transition:.2s;border-left:3px solid transparent;margin:2px 0;}
.menu-item:hover{color:#FFF;background:rgba(255,255,255,0.06);}
.menu-item.active{color:#FFF;background:var(--blue);border-left-color:var(--blue);}
.menu-item svg{flex-shrink:0;opacity:0.85;}
.menu-item.active svg{opacity:1;}

/* Main area */
.main{margin-left:var(--sidebar-w);min-height:100vh;display:flex;flex-direction:column;}
.header{height:var(--header-h);background:#FFF;border-bottom:1px solid #E8E8E8;display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:50;}
.breadcrumb{font-size:14px;color:#666;}
.breadcrumb span{color:#333;font-weight:500;}
.header-user{display:flex;align-items:center;gap:8px;font-size:14px;}
.header-avatar{width:28px;height:28px;border-radius:50%;background:var(--blue);color:#FFF;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;}
.content-area{padding:24px;flex:1;}

/* Pages */
.page{display:none;}
.page.active{display:block;animation:fadeIn .25s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* Card */
.card{background:#FFF;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.08);padding:20px;margin-bottom:20px;}

/* Stat cards */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:20px;}
.stat-card{background:#FFF;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.08);padding:20px;display:flex;align-items:center;gap:16px;border-left:4px solid transparent;}
.stat-card .stat-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;}
.stat-card .stat-num{font-size:28px;font-weight:700;}
.stat-card .stat-label{font-size:13px;color:#999;margin-top:2px;}
.stat-card .stat-trend{font-size:12px;margin-top:4px;}

/* Search bar */
.search-bar{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
.search-bar input[type="text"]{height:36px;border:1px solid #D9D9D9;border-radius:6px;padding:0 12px;width:220px;transition:.2s;}
.search-bar input[type="text"]:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(22,119,255,0.1);}
.search-bar select{height:36px;border:1px solid #D9D9D9;border-radius:6px;padding:0 12px;background:#FFF;min-width:130px;cursor:pointer;}
.search-bar select:focus{border-color:var(--blue);}
.search-right{margin-left:auto;display:flex;gap:8px;}

/* Buttons */
.btn{height:36px;padding:0 16px;border-radius:6px;font-size:14px;display:inline-flex;align-items:center;justify-content:center;gap:6px;transition:.2s;cursor:pointer;border:1px solid transparent;white-space:nowrap;}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--blue);color:#FFF;}.btn-primary:hover{background:#4096FF;}
.btn-success{background:var(--green);color:#FFF;}.btn-success:hover{background:#73D13D;}
.btn-danger{background:var(--red);color:#FFF;}.btn-danger:hover{background:#FF7875;}
.btn-default{background:#FFF;color:#333;border-color:#D9D9D9;}.btn-default:hover{color:var(--blue);border-color:var(--blue);}
.btn-link{color:var(--blue);padding:0 4px;height:auto;background:none;}.btn-link:hover{color:#4096FF;}
.btn-link-orange{color:var(--orange);padding:0 4px;height:auto;background:none;}.btn-link-orange:hover{opacity:.8;}
.btn-link-green{color:var(--green);padding:0 4px;height:auto;background:none;}.btn-link-green:hover{opacity:.8;}
.btn-link-red{color:var(--red);padding:0 4px;height:auto;background:none;}.btn-link-red:hover{opacity:.8;}
.btn-sm{height:28px;padding:0 10px;font-size:12px;}

/* Table */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:14px;}
thead th{background:#FAFAFA;padding:12px 14px;text-align:left;font-weight:500;color:#666;border-bottom:1px solid #E8E8E8;white-space:nowrap;}
tbody td{padding:12px 14px;border-bottom:1px solid #F0F0F0;vertical-align:middle;}
tbody tr:hover{background:#FAFBFC;}
tbody tr:last-child td{border-bottom:none;}

/* Tags */
.tag{display:inline-flex;align-items:center;padding:2px 10px;border-radius:12px;font-size:12px;font-weight:500;white-space:nowrap;}
.tag-green{background:#F6FFED;color:#52C41A;border:1px solid #B7EB8F;}
.tag-red{background:#FFF2F0;color:#FF4D4F;border:1px solid #FFCCC7;}
.tag-yellow{background:#FFFBE6;color:#D48806;border:1px solid #FFE58F;}
.tag-orange{background:#FFF7E6;color:#FA8C16;border:1px solid #FFD591;}
.tag-blue{background:#E6F4FF;color:#1677FF;border:1px solid #91CAFF;}
.tag-gray{background:#F5F5F5;color:#999;border:1px solid #D9D9D9;}
.tag-purple{background:#F9F0FF;color:#722ED1;border:1px solid #D3ADF7;}

/* Pagination */
.pagination{display:flex;align-items:center;justify-content:flex-end;gap:6px;margin-top:16px;font-size:13px;}
.pagination button{width:32px;height:32px;border-radius:6px;border:1px solid #D9D9D9;background:#FFF;display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;transition:.15s;}
.pagination button:hover:not(:disabled){border-color:var(--blue);color:var(--blue);}
.pagination button.active{background:var(--blue);color:#FFF;border-color:var(--blue);}
.pagination button:disabled{opacity:.4;cursor:not-allowed;}
.pagination .pg-info{color:#999;margin-right:8px;}

/* Tabs */
.tab-bar{display:flex;gap:0;margin-bottom:16px;border-bottom:1px solid #E8E8E8;}
.tab-item{padding:10px 20px;cursor:pointer;font-size:14px;color:#666;border-bottom:2px solid transparent;transition:.2s;position:relative;}
.tab-item:hover{color:var(--blue);}
.tab-item.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:500;}
.tab-badge{position:absolute;top:4px;right:4px;background:var(--red);color:#FFF;font-size:10px;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px;}

/* Modal */
.modal-mask{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.45);z-index:1000;display:none;justify-content:center;align-items:center;}
.modal-mask.show{display:flex;}
.modal-box{background:#FFF;border-radius:12px;width:520px;max-height:85vh;display:flex;flex-direction:column;animation:modalIn .2s ease;}
.modal-box.lg{width:640px;}
@keyframes modalIn{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid #F0F0F0;flex-shrink:0;}
.modal-header h3{font-size:16px;font-weight:600;}
.modal-close{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#999;transition:.2s;font-size:18px;}
.modal-close:hover{background:#F5F5F5;color:#333;}
.modal-body{padding:20px 24px;overflow-y:auto;flex:1;}
.modal-footer{padding:12px 24px;border-top:1px solid #F0F0F0;display:flex;justify-content:flex-end;gap:8px;flex-shrink:0;}

/* Form */
.form-group{margin-bottom:16px;}
.form-label{display:block;font-size:13px;color:#666;margin-bottom:6px;font-weight:500;}
.form-label .req{color:var(--red);margin-right:2px;}
.form-input{width:100%;height:36px;border:1px solid #D9D9D9;border-radius:6px;padding:0 12px;font-size:14px;transition:.2s;}
.form-input:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(22,119,255,0.1);}
.form-textarea{width:100%;border:1px solid #D9D9D9;border-radius:6px;padding:10px 12px;font-size:14px;resize:vertical;min-height:80px;transition:.2s;}
.form-textarea:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(22,119,255,0.1);}
.form-select{width:100%;height:36px;border:1px solid #D9D9D9;border-radius:6px;padding:0 12px;font-size:14px;background:#FFF;cursor:pointer;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.form-radio-group{display:flex;gap:16px;align-items:center;padding:6px 0;}
.form-radio-group label{display:flex;align-items:center;gap:4px;cursor:pointer;font-size:14px;}
.form-radio-group input{accent-color:var(--blue);}
.form-check-group label{display:flex;align-items:center;gap:4px;cursor:pointer;font-size:14px;margin-right:12px;}
.form-check-group input{accent-color:var(--blue);}
.option-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.option-row .opt-letter{width:28px;height:28px;border-radius:50%;background:#F0F0F0;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;flex-shrink:0;}
.option-row input[type="text"]{flex:1;height:36px;border:1px solid #D9D9D9;border-radius:6px;padding:0 12px;font-size:14px;}
.option-row input[type="text"]:focus{border-color:var(--blue);}

/* Charts */
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}
.chart-card{background:#FFF;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.08);padding:20px;}
.chart-title{font-size:15px;font-weight:600;margin-bottom:16px;}
.pie-chart{width:180px;height:180px;border-radius:50%;margin:0 auto;position:relative;}
.pie-legend{display:flex;flex-direction:column;gap:8px;margin-top:16px;}
.pie-legend-item{display:flex;align-items:center;gap:8px;font-size:13px;}
.pie-legend-item .dot{width:12px;height:12px;border-radius:3px;flex-shrink:0;}
.bar-chart{display:flex;align-items:flex-end;gap:16px;height:180px;padding-top:10px;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;}
.bar-fill{width:100%;border-radius:4px 4px 0 0;transition:.3s;min-height:4px;}
.bar-label{font-size:11px;color:#999;}
.bar-value{font-size:12px;font-weight:600;color:#333;}

/* Pending list */
.pending-list{list-style:none;}
.pending-item{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid #F0F0F0;cursor:pointer;transition:.15s;}
.pending-item:hover{background:#FAFBFC;margin:0 -20px;padding:10px 20px;}
.pending-item:last-child{border-bottom:none;}
.pending-dot{width:8px;height:8px;border-radius:50%;margin-right:12px;flex-shrink:0;}
.pending-text{flex:1;font-size:13px;}
.pending-time{font-size:12px;color:#999;margin-left:12px;}

/* E-license card */
.elicense-card{width:360px;margin:0 auto;border-radius:16px;padding:28px 24px;background:linear-gradient(135deg,#4A9CF6 0%,#3B82F6 50%,#2563EB 100%);color:#FFF;position:relative;overflow:hidden;}
.elicense-card::after{content:'';position:absolute;top:-20px;right:-20px;width:120px;height:120px;border:3px solid rgba(255,255,255,0.12);border-radius:50%;pointer-events:none;}
.elicense-card::before{content:'';position:absolute;bottom:-30px;right:20px;width:80px;height:80px;border:2px solid rgba(255,255,255,0.08);border-radius:50%;pointer-events:none;}
.elicense-brand{font-size:13px;opacity:.8;margin-bottom:20px;letter-spacing:2px;}
.elicense-name{font-size:22px;font-weight:700;margin-bottom:4px;}
.elicense-no{font-size:14px;opacity:.8;margin-bottom:16px;}
.elicense-info{display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:13px;}
.elicense-info dt{opacity:.7;}
.elicense-info dd{font-weight:500;margin-bottom:8px;}
.elicense-stamp{position:absolute;bottom:16px;right:16px;width:64px;height:64px;border:2px solid rgba(255,255,255,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;opacity:.5;transform:rotate(-15deg);}

/* Accordion */
.accordion-item{border:1px solid #E8E8E8;border-radius:8px;margin-bottom:12px;overflow:hidden;}
.accordion-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;background:#FAFBFC;transition:.2s;}
.accordion-header:hover{background:#F0F5FF;}
.accordion-header .acc-arrow{transition:.2s;color:#999;}
.accordion-item.open .acc-arrow{transform:rotate(180deg);}
.accordion-body{display:none;padding:0 16px 16px;}
.accordion-item.open .accordion-body{display:block;}

/* Student info card in exam detail */
.student-info-card{display:flex;align-items:center;gap:16px;padding:16px;background:#F0F5FF;border-radius:8px;margin-bottom:20px;}
.student-avatar-lg{width:56px;height:56px;border-radius:50%;background:var(--blue);color:#FFF;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;flex-shrink:0;}
.student-info-text{flex:1;}
.student-info-text h4{font-size:16px;font-weight:600;margin-bottom:4px;}
.student-info-text p{font-size:13px;color:#666;}

/* Answer detail */
.answer-item{margin-bottom:20px;padding:16px;border:1px solid #E8E8E8;border-radius:8px;}
.answer-q{font-weight:500;margin-bottom:10px;line-height:1.6;}
.answer-opt{padding:6px 12px;margin:4px 0;border-radius:6px;font-size:13px;display:flex;align-items:center;gap:8px;}
.answer-opt.correct{background:#F6FFED;color:#389E0D;border:1px solid #B7EB8F;}
.answer-opt.wrong{background:#FFF2F0;color:#FF4D4F;border:1px solid #FFCCC7;}
.answer-opt.neutral{background:#F8F8F8;border:1px solid #E8E8E8;color:#666;}
.answer-analysis{margin-top:10px;padding:10px;background:#FFFBE6;border-radius:6px;font-size:12px;color:#AD6800;line-height:1.6;}

/* Progress bar */
.progress-bar{height:6px;background:#F0F0F0;border-radius:3px;overflow:hidden;width:80px;display:inline-block;vertical-align:middle;margin-left:6px;}
.progress-fill{height:100%;border-radius:3px;background:var(--blue);transition:.3s;}

/* Toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-20px);background:rgba(0,0,0,0.78);color:#FFF;padding:10px 24px;border-radius:8px;font-size:14px;z-index:9999;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* Confirm dialog */
.confirm-mask{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.45);z-index:2000;display:none;justify-content:center;align-items:center;}
.confirm-mask.show{display:flex;}
.confirm-box{background:#FFF;border-radius:12px;padding:24px;width:400px;animation:modalIn .2s ease;}
.confirm-title{font-size:16px;font-weight:600;margin-bottom:12px;}
.confirm-msg{font-size:14px;color:#666;margin-bottom:20px;line-height:1.6;}
.confirm-btns{display:flex;justify-content:flex-end;gap:8px;}

/* Misc */
.text-ellipsis{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px;display:inline-block;vertical-align:middle;}
.avatar-sm{width:32px;height:32px;border-radius:50%;background:#E6F4FF;color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;}
.flex-center{display:flex;align-items:center;gap:8px;}
.score-pass{color:var(--blue);font-weight:700;}
.score-fail{color:var(--red);font-weight:700;}
.empty-state{text-align:center;padding:40px;color:#999;font-size:14px;}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-logo">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="6" fill="#1677FF"/><path d="M7 14h14M14 7v14" stroke="#FFF" stroke-width="2.5" stroke-linecap="round"/></svg>

</div>

<!-- Main -->
<div class="main">
  <div class="header">
    <div class="breadcrumb">首页 / <span id="breadcrumbText">数据看板</span></div>
    <div class="header-user">
      <div class="header-avatar">管</div>
      <span>管理员</span>

    <div class="page" id="pg-reviews"></div>

    <div class="page" id="pg-questions"></div>
    <!-- A6: Exams -->
    <div class="page" id="pg-exams"></div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Confirm Dialog -->
<div class="confirm-mask" id="confirmMask">
  <div class="confirm-box">

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}

let confirmCb=null;
function showConfirm(title,msg,cb,dangerBtn){
  document.getElementById('confirmTitle').textContent=title;
  document.getElementById('confirmMsg').textContent=msg;
  const ok=document.getElementById('confirmOk');
  ok.className='btn '+(dangerBtn?'btn-danger':'btn-primary');
  ok.textContent='确认';
  confirmCb=cb;
  ok.onclick=()=>{closeConfirm();if(confirmCb)confirmCb();};
  document.getElementById('confirmMask').classList.add('show');
}
function closeConfirm(){document.getElementById('confirmMask').classList.remove('show');confirmCb=null;}

function openModal(title,bodyHtml,footerHtml,isLg){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalBody').innerHTML=bodyHtml;
  document.getElementById('modalFooter').innerHTML=footerHtml||'';
  document.getElementById('modalBox').className='modal-box'+(isLg?' lg':'');
  document.getElementById('modalMask').classList.add('show');
}
function closeModal(){document.getElementById('modalMask').classList.remove('show');}

function paginate(arr,page,size){
  const total=Math.ceil(arr.length/size)||1;
  const p=Math.max(1,Math.min(page,total));
  return{data:arr.slice((p-1)*size,p*size),page:p,total,count:arr.length};
}
function renderPagination(pg,onPage){
  let h=`<span class="pg-info">共 ${pg.count} 条</span>`;
  h+=`<button ${pg.page<=1?'disabled':''} onclick="${onPage}(${pg.page-1})">&lt;</button>`;
  for(let i=1;i<=pg.total;i++){
    if(pg.total>7&&i>2&&i<pg.total-1&&Math.abs(i-pg.page)>1){
      if(i===3||i===pg.total-2)h+='<span style="padding:0 4px;color:#999">...</span>';
      continue;
    }
    h+=`<button class="${i===pg.page?'active':''}" onclick="${onPage}(${i})">${i}</button>`;
  }
  h+=`<button ${pg.page>=pg.total?'disabled':''} onclick="${onPage}(${pg.page+1})">&gt;</button>`;
  return h;
}

function showViolationDetail(no){
  const vl=violations.filter(v=>v.licenseNo===no);

  let html=`<p style="margin-bottom:12px;font-weight:500">${l?l.name:''} (${no}) 的违纪记录</p>`;

  else html+=`<table style="font-size:13px"><thead><tr><th>时间</th><th>类型</th><th>扣分</th><th>描述</th><th>状态</th></tr></thead><tbody>${vl.map(v=>`<tr><td>${v.time}</td><td>${v.type}</td><td style="color:var(--red);font-weight:600">${v.deduct}</td><td>${v.desc}</td><td><span class="tag ${v.status==='已处理'?'tag-green':'tag-orange'}">${v.status}</span></td></tr>`).join('')}</tbody></table>`;
  openModal('违纪详情',html,'<button class="btn btn-default" onclick="closeModal()">关闭</button>',true);

function showScoreLog(no){
  const l=licenses.find(x=>x.licenseNo===no);if(!l)return;

  let html=`<p style="margin-bottom:8px">当前执照分：<strong style="color:var(--blue);font-size:18px">${l.score}</strong> / 24</p>`;
  if(vl.length)html+=`<table style="font-size:13px;margin-top:8px"><thead><tr><th>时间</th><th>事由</th><th>扣分</th></tr></thead><tbody>${vl.map(v=>`<tr><td>${v.time}</td><td>${v.type} - ${v.desc}</td><td style="color:var(--red)">-${v.deduct}</td></tr>`).join('')}</tbody></table>`;

function saveStudent(id){
  const nick=document.getElementById('sf_nick').value.trim();
  const name=document.getElementById('sf_name').value.trim();
  const phone=document.getElementById('sf_phone').value.trim();
  const wechat=document.getElementById('sf_wechat').value.trim();
  const city=document.getElementById('sf_city').value;
  if(!nick||!name||!phone){toast('请填写必填字段');return;}
  if(!/^1\d{10}$/.test(phone)){toast('手机号格式不正确');return;}
  if(id){
    const s=students.find(x=>x.id===id);
    if(s){
      if(phone!==s.phone&&students.some(x=>x.id!==id&&x.phone===phone)){toast('该手机号已注册');return;}
      s.nickname=nick;s.name=name;s.phone=phone;s.wechat=wechat;s.city=city;
      const stEl=document.getElementById('sf_status');if(stEl)s.status=stEl.value;
    }
  }else{
    if(students.some(x=>x.phone===phone)){toast('该手机号已注册');return;}
    const cityAdCode={厦门:'3502',福州:'3501',泉州:'3505',杭州:'3301',北京:'1101'};
    const code=cityAdCode[city]||'9999';
    const maxSeq=licenses.reduce((mx,l)=>{if(l.licenseNo.startsWith(code)){const n=parseInt(l.licenseNo.slice(4))||0;return Math.max(mx,n);}return mx;},0);
    const seq=String(maxSeq+1).padStart(5,'0');
    const licNo=`${code}${seq}`;
    const newId='STU'+String(students.length+1).padStart(3,'0');
    students.push({id:newId,avatar:name[0],nickname:nick,name,licenseNo:licNo,status:'有效',phone,city,wechat});
    licenses.push({licenseNo:licNo,name,gender:'未知',birthday:'',status:'正常',score:24,certStartDate:new Date().toISOString().slice(0,10),certEndDate:'',nextAuditDate:'',trainingCenter:city+'培训中心',phone});
    saveData(LS_LICENSES,licenses);
  }
  saveData(LS_STUDENTS,students);
  closeModal();toast(id?'修改成功':'添加成功');renderStudents();
}

        ${['全部','待审核','已通过','不通过'].map(t=>`<div class="tab-item ${revTab===t?'active':''}" onclick="revTab='${t}';revPage=1;renderReviews()">${t}${t==='待审核'&&pendingCount?`<span class="tab-badge">${pendingCount}</span>`:''}</div>`).join('')}
      </div>

            <td><span class="tag ${methodTag(r.method)}">${r.method}</span></td>
            <td>${r.submitTime}</td>
            <td><span class="tag ${r.status==='待审核'?'tag-blue':r.status==='已通过'?'tag-green':'tag-red'}">${r.status}</span></td>
            <td>${r.status==='待审核'?`<button class="btn btn-success btn-sm" onclick="approveReview('${r.id}')">通过</button> <button class="btn btn-danger btn-sm" onclick="rejectReviewModal('${r.id}')">不通过</button>`:r.status==='不通过'?`<span style="font-size:12px;color:var(--red)">${r.rejectReason||''}</span>`:'<span style="color:#999;font-size:12px">已审核</span>'}</td>
          </tr>`).join('')}</tbody>

    </div>
  `;
}

function approveReview(id){
  const r=reviews.find(x=>x.id===id);if(r){r.status='已通过';saveData(LS_REVIEWS,reviews);toast('审核已通过');renderReviews();}
}
function rejectReviewModal(id){
  openModal('不通过原因',`
    <div class="form-group"><label class="form-label">选择原因</label><select class="form-select" id="rj_preset" onchange="document.getElementById('rj_reason').value=this.value"><option value="">自定义原因</option><option value="照片模糊，无法识别面部特征">照片模糊</option><option value="材料信息与登记信息不符">信息不符</option><option value="材料过期，请提交有效期内的材料">材料过期</option><option value="材料不完整，缺少必要信息">材料不完整</option></select></div>
    <div class="form-group"><label class="form-label"><span class="req">*</span>详细原因</label><textarea class="form-textarea" id="rj_reason" rows="3"></textarea></div>
  `,`<button class="btn btn-default" onclick="closeModal()">取消</button><button class="btn btn-danger" onclick="doRejectReview('${id}')">确认不通过</button>`);

function doRejectReview(id){
  const reason=document.getElementById('rj_reason').value.trim();

  const r=reviews.find(x=>x.id===id);if(r){r.status='不通过';r.rejectReason=reason;saveData(LS_REVIEWS,reviews);closeModal();toast('已设为不通过');renderReviews();}
}

function buildOptionsHtml(type,q){
  if(type==='judge'){
    const ans=q?q.answer:0;
    return `<div class="form-group"><label class="form-label">正确答案</label>
      <div class="form-radio-group"><label><input type="radio" name="qf_judge" value="0" ${ans===0?'checked':''}>正确</label><label><input type="radio" name="qf_judge" value="1" ${ans===1?'checked':''}>错误</label></div></div>`;
  }
  const letters=['A','B','C','D'];
  const isMulti=type==='multi';
  const inputType=isMulti?'checkbox':'radio';
  let html='<div class="form-group"><label class="form-label">选项设置（勾选正确答案）</label>';
  for(let i=0;i<4;i++){
    const val=q&&q.options[i]?q.options[i].replace(/^[A-D]\.\s*/,''):'';
    let checked=false;
    if(q){
      if(isMulti)checked=Array.isArray(q.answer)&&q.answer.includes(i);
      else checked=q.answer===i;
    }
    html+=`<div class="option-row"><div class="opt-letter">${letters[i]}</div><input type="text" id="qf_opt${i}" value="${val}"><input type="${inputType}" name="qf_ans" value="${i}" ${checked?'checked':''}></div>`;
  }
  html+='</div>';
  return html;
}

function toggleQType(){
  const type=document.querySelector('input[name="qf_type"]:checked').value;
  document.getElementById('qf_options_wrap').innerHTML=buildOptionsHtml(type,null);
}

function saveQuestion(id){
  const type=document.querySelector('input[name="qf_type"]:checked').value;
  const text=document.getElementById('qf_text').value.trim();
  if(!text){toast('请输入题目内容');return;}
  let options,answer;
  if(type==='judge'){
    options=['正确','错误'];
    answer=parseInt(document.querySelector('input[name="qf_judge"]:checked').value);
  }else{
    options=[];
    const letters=['A','B','C','D'];
    for(let i=0;i<4;i++){
      const v=document.getElementById('qf_opt'+i).value.trim();
      options.push(letters[i]+'. '+(v||'选项'+(i+1)));
    }
    const checked=[...document.querySelectorAll('input[name="qf_ans"]:checked')].map(x=>parseInt(x.value));
    if(checked.length===0){toast('请选择正确答案');return;}
    answer=type==='multi'?checked:checked[0];
  }
  const cat=document.getElementById('qf_cat').value;
  const diff=document.getElementById('qf_diff').value;
  const score=parseInt(document.getElementById('qf_score').value)||2;
  const analysis=document.getElementById('qf_analysis').value.trim();
  if(id){
    const q=questions.find(x=>x.id===id);
    if(q){Object.assign(q,{type,question:text,options,answer,category:cat,difficulty:diff,score,analysis});}
  }else{
    const newId='Q'+String(questions.length+1).padStart(3,'0');
    questions.push({id:newId,type,category:cat,difficulty:diff,question:text,options,answer,analysis,score,creator:'管理员',createTime:new Date().toISOString().slice(0,10),status:'生效'});
  }
  saveData(LS_QUESTIONS,questions);closeModal();toast(id?'修改成功':'添加成功');renderQuestions();
}

function deleteQuestion(id){
  showConfirm('删除题目','确认删除该题目？删除后不可恢复。',()=>{
    questions=questions.filter(q=>q.id!==id);saveData(LS_QUESTIONS,questions);toast('已删除');renderQuestions();
  },true);
}

    html+=`<div class="answer-item"><div class="answer-q">${i+1}. ${q.question}</div>`;
    q.options.forEach((opt,oi)=>{
      const isCorrect=Array.isArray(q.answer)?q.answer.includes(oi):q.answer===oi;
      html+=`<div class="answer-opt ${isCorrect?'correct':'neutral'}">${isCorrect?'&#10003; ':''}${opt}</div>`;
    });
    html+=`<div class="answer-analysis">解析：${q.analysis}</div></div>`;
  });
  openModal('成绩详情',html,'<button class="btn btn-default" onclick="closeModal()">关闭</button>',true);
}

// ========== A9: VIOLATIONS ==========
let vioPage=1;
function renderViolations(){
  const el=document.getElementById('pg-violations');
  const kw=(document.getElementById('vio_kw')||{}).value||'';
  const st=(document.getElementById('vio_st')||{}).value||'';
  const tp=(document.getElementById('vio_tp')||{}).value||'';
  let list=violations.filter(v=>{
    if(kw&&!v.name.includes(kw)&&!v.licenseNo.includes(kw))return false;
    if(st&&v.status!==st)return false;
    if(tp&&v.type!==tp)return false;
    return true;
  });
  const pg=paginate(list,vioPage,5);
  el.innerHTML=`
    <div class="card">
      <div class="search-bar">
        <input type="text" id="vio_kw" placeholder="姓名/执照编号搜索" value="${kw}" onkeyup="if(event.key==='Enter'){vioPage=1;renderViolations();}">
        <select id="vio_st" onchange="vioPage=1;renderViolations()"><option value="">全部状态</option><option value="待处理" ${st==='待处理'?'selected':''}>待处理</option><option value="已处理" ${st==='已处理'?'selected':''}>已处理</option></select>
        <select id="vio_tp" onchange="vioPage=1;renderViolations()"><option value="">全部类型</option>${['服务质量','违规操作','客户投诉','其他'].map(t=>`<option value="${t}" ${tp===t?'selected':''}>${t}</option>`).join('')}</select>
        <button class="btn btn-primary" onclick="vioPage=1;renderViolations()">查询</button>
        <button class="btn btn-default" onclick="document.getElementById('vio_kw').value='';document.getElementById('vio_st').value='';document.getElementById('vio_tp').value='';vioPage=1;renderViolations()">重置</button>
        <div class="search-right"><button class="btn btn-primary" onclick="showAddViolationModal()">+ 新增违规记录</button></div>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>序号</th><th>违规人员</th><th>违规类型</th><th>违规时间</th><th>扣分</th><th>违规描述</th><th>状态</th><th>操作</th></tr></thead>
          <tbody>${pg.data.length?pg.data.map((v,i)=>`<tr>
            <td>${(pg.page-1)*5+i+1}</td>
            <td><div><div style="font-weight:500">${v.name}</div><div style="font-size:11px;color:#999">${v.licenseNo}</div></div></td>
            <td><span class="tag tag-orange">${v.type}</span></td>
            <td>${v.time}</td>
            <td style="color:var(--red);font-weight:700;font-size:16px">${v.deduct||'-'}</td>
            <td><span class="text-ellipsis" title="${v.desc}">${v.desc}</span></td>
            <td><span class="tag ${v.status==='已处理'?'tag-green':'tag-orange'}">${v.status}</span></td>
            <td>${v.status==='待处理'?`<button class="btn btn-primary btn-sm" onclick="showHandleViolationModal('${v.id}')">处理</button>`:`<button class="btn btn-default btn-sm" onclick="showViolationHandleDetail('${v.id}')">查看</button>`}</td>
          </tr>`).join(''):'<tr><td colspan="8" class="empty-state">暂无数据</td></tr>'}</tbody>
        </table>
      </div>
      <div class="pagination">${renderPagination(pg,'vioPageTo')}</div>
    </div>
  `;
}
function vioPageTo(p){vioPage=p;renderViolations();}

function showAddViolationModal(){
  const opts=students.map(s=>`<option value="${s.licenseNo}">${s.name} (${s.licenseNo})</option>`).join('');
  openModal('新增违规记录',`
    <div class="form-group"><label class="form-label"><span class="req">*</span>违规人员</label><select class="form-select" id="vf_person"><option value="">请选择</option>${opts}</select></div>
    <div class="form-group"><label class="form-label"><span class="req">*</span>违规类型</label><select class="form-select" id="vf_type">${['服务质量','违规操作','客户投诉','其他'].map(t=>`<option value="${t}">${t}</option>`).join('')}</select></div>
    <div class="form-group"><label class="form-label">违规时间</label><input class="form-input" type="date" id="vf_time" value="${new Date().toISOString().slice(0,10)}"></div>
    <div class="form-group"><label class="form-label"><span class="req">*</span>违规描述</label><textarea class="form-textarea" id="vf_desc" rows="3"></textarea></div>
  `,`<button class="btn btn-default" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="addViolation()">提交</button>`);
}

function addViolation(){
  const licNo=document.getElementById('vf_person').value;
  const type=document.getElementById('vf_type').value;
  const time=document.getElementById('vf_time').value;
  const desc=document.getElementById('vf_desc').value.trim();
  if(!licNo||!desc){toast('请填写必填字段');return;}
  const stu=students.find(s=>s.licenseNo===licNo);
  const newId='V'+String(violations.length+1).padStart(3,'0');
  violations.push({id:newId,licenseNo:licNo,name:stu?stu.name:'',type,time,deduct:0,desc,status:'待处理',handleType:'',handleNote:''});
  saveData(LS_VIOLATIONS,violations);closeModal();toast('违规记录已添加');renderViolations();
}

function showHandleViolationModal(id){
  const v=violations.find(x=>x.id===id);if(!v)return;
  openModal('处理违规',`
    <div style="margin-bottom:16px;padding:12px;background:#FFF7E6;border-radius:8px;font-size:13px;border:1px solid #FFE58F">
      <p><strong>${v.name}</strong> (${v.licenseNo}) | ${v.type} | ${v.time}</p>
      <p style="margin-top:4px;color:#666">${v.desc}</p>
    </div>
    <div class="form-group"><label class="form-label"><span class="req">*</span>处理方式</label>
      <div class="form-radio-group">
        <label><input type="radio" name="vh_type" value="扣分" checked onchange="toggleDeductInput()">扣分</label>
        <label><input type="radio" name="vh_type" value="冻结执照" onchange="toggleDeductInput()">冻结执照</label>
        <label><input type="radio" name="vh_type" value="吊销执照" onchange="toggleDeductInput()">吊销执照</label>
      </div>
    </div>
    <div class="form-group" id="vh_deduct_wrap"><label class="form-label">扣分分值</label><input class="form-input" type="number" id="vh_deduct" min="1" max="24" value="3"></div>
    <div class="form-group"><label class="form-label">处理备注</label><textarea class="form-textarea" id="vh_note" rows="2"></textarea></div>
  `,`<button class="btn btn-default" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="handleViolation('${id}')">确认处理</button>`);
}

function toggleDeductInput(){
  const type=document.querySelector('input[name="vh_type"]:checked').value;
  document.getElementById('vh_deduct_wrap').style.display=type==='扣分'?'block':'none';
}

function handleViolation(id){
  const v=violations.find(x=>x.id===id);if(!v)return;
  const handleType=document.querySelector('input[name="vh_type"]:checked').value;
  const note=document.getElementById('vh_note').value.trim();
  const deduct=handleType==='扣分'?parseInt(document.getElementById('vh_deduct').value)||0:0;
  v.status='已处理';v.handleType=handleType;v.handleNote=note;v.deduct=deduct;

  // Update license
  const lic=licenses.find(l=>l.licenseNo===v.licenseNo);
  if(lic){
    if(handleType==='扣分'){lic.score=Math.max(0,lic.score-deduct);}
    else if(handleType==='冻结执照'){lic.status='冻结';}
    else if(handleType==='吊销执照'){lic.status='已吊销';lic.score=0;}
    saveData(LS_LICENSES,licenses);
  }
  saveData(LS_VIOLATIONS,violations);closeModal();toast('违规已处理');renderViolations();
}

function showViolationHandleDetail(id){
  const v=violations.find(x=>x.id===id);if(!v)return;
  openModal('处理详情',`
    <div style="line-height:2">
      <p><strong>违规人员：</strong>${v.name} (${v.licenseNo})</p>
      <p><strong>违规类型：</strong>${v.type}</p>
      <p><strong>违规时间：</strong>${v.time}</p>
      <p><strong>违规描述：</strong>${v.desc}</p>
      <hr style="border:none;border-top:1px solid #F0F0F0;margin:12px 0">
      <p><strong>处理方式：</strong><span class="tag tag-blue">${v.handleType}</span></p>
      ${v.deduct?`<p><strong>扣分：</strong><span style="color:var(--red);font-weight:600">${v.deduct} 分</span></p>`:''}
      <p><strong>处理备注：</strong>${v.handleNote||'无'}</p>
    </div>
  `,'<button class="btn btn-default" onclick="closeModal()">关闭</button>');
}

// ========== INIT ==========
initData();
renderDashboard();
</script>
