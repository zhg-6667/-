<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>首页场景预览</title>
  <style>
    :root {
      --bg-1: #f4f7fb;
      --bg-2: #dbe8f7;
      --surface: rgba(255, 255, 255, 0.82);
      --surface-strong: #ffffff;
      --text-1: #162033;
      --text-2: #5f6b80;
      --text-3: #8c96a8;
      --line: rgba(17, 24, 39, 0.08);
      --accent: #2f7cf6;
      --accent-2: #6aa8ff;
      --accent-soft: rgba(47, 124, 246, 0.12);
      --success: #18a36d;
      --warning: #f4a11a;
      --danger: #ef5350;
      --shadow-lg: 0 28px 70px rgba(28, 53, 87, 0.16);
      --shadow-md: 0 14px 32px rgba(37, 63, 103, 0.12);
      --shadow-sm: 0 8px 18px rgba(43, 62, 92, 0.08);
      --gradient: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "SF Pro Display", "PingFang SC", "Helvetica Neue", sans-serif;
      color: var(--text-1);
      background:
        radial-gradient(circle at top left, rgba(67, 131, 255, 0.18), transparent 28%),
        radial-gradient(circle at bottom right, rgba(21, 168, 124, 0.1), transparent 24%),
        linear-gradient(180deg, #f7f9fc 0%, #eef4fb 48%, #dde8f5 100%);
      padding: 28px;
    }

    button {
      border: 0;
      background: none;
      font: inherit;
      cursor: pointer;
    }

    .app-shell {
      max-width: 1320px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 320px minmax(360px, 1fr);
      gap: 28px;
      align-items: start;
      height: calc(100vh - 56px);
    }

    .panel,
    .phone-panel {
      background: rgba(255, 255, 255, 0.58);
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 28px;
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow-lg);
    }

    .panel {
      padding: 24px;
      position: sticky;
      top: 28px;
      max-height: calc(100vh - 56px);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(22, 32, 51, 0.05);
      color: var(--text-2);
      font-size: 12px;
      letter-spacing: 0.08em;
    }

    .eyebrow::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 6px var(--accent-soft);
    }

    .panel h1 {
      font-size: 26px;
      line-height: 1.15;
      margin-top: 18px;
    }

    .panel .intro {
      color: var(--text-2);
      font-size: 14px;
      line-height: 1.75;
      margin-top: 14px;
    }

    .panel-section {
      margin-top: 24px;
    }

    .panel-scroll {
      margin-top: 6px;
      overflow-y: auto;
      padding-right: 4px;
      min-height: 0;
    }

    .panel-scroll::-webkit-scrollbar {
      width: 6px;
    }

    .panel-scroll::-webkit-scrollbar-thumb {
      background: rgba(22, 32, 51, 0.14);
      border-radius: 999px;
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .section-title h2 {
      font-size: 15px;
      font-weight: 700;
    }

    .section-title span {
      color: var(--text-3);
      font-size: 12px;
    }

    .scenario-list {
      display: grid;
      gap: 10px;
    }

    .scenario-btn {
      width: 100%;
      text-align: left;
      padding: 14px 16px;
      border-radius: 18px;
      border: 1px solid rgba(15, 23, 42, 0.06);
      background: rgba(255, 255, 255, 0.84);
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      box-shadow: var(--shadow-sm);
    }

    .scenario-btn:hover {
      transform: translateY(-1px);
    }

    .scenario-btn.active {
      border-color: rgba(47, 124, 246, 0.26);
      box-shadow: 0 16px 28px rgba(47, 124, 246, 0.16);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(241, 247, 255, 0.96));
    }

    .scenario-btn small {
      display: block;
      color: var(--text-3);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .scenario-btn strong {
      display: block;
      font-size: 15px;
      margin-bottom: 4px;
    }

    .scenario-btn p {
      color: var(--text-2);
      font-size: 12px;
      line-height: 1.5;
    }

    .legend {
      display: grid;
      gap: 10px;
      margin-top: 8px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-2);
      font-size: 13px;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex: 0 0 auto;
    }

    .legend-dot.red { background: var(--danger); }
    .legend-dot.orange { background: var(--warning); }
    .legend-dot.green { background: var(--success); }

    .helper-box {
      margin-top: 22px;
      padding: 16px 18px;
      border-radius: 20px;
      background: linear-gradient(135deg, rgba(20, 36, 60, 0.94), rgba(31, 76, 152, 0.94));
      color: rgba(255, 255, 255, 0.88);
      box-shadow: var(--shadow-md);
    }

    .helper-box h3 {
      font-size: 15px;
      margin-bottom: 10px;
    }

    .helper-box p {
      font-size: 12px;
      line-height: 1.7;
    }

    .helper-box .ghost-btn {
      width: 100%;
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 14px;
      color: #fff;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.14);
    }

    .phone-panel {
      padding: 18px;
      height: calc(100vh - 56px);
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
      position: sticky;
      top: 28px;
    }

    .phone-panel::before,
    .phone-panel::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      filter: blur(8px);
      opacity: 0.5;
    }

    .phone-panel::before {
      width: 220px;
      height: 220px;
      top: -40px;
      right: -60px;
      background: rgba(47, 124, 246, 0.12);
    }

    .phone-panel::after {
      width: 160px;
      height: 160px;
      bottom: 10px;
      left: -40px;
      background: rgba(21, 168, 124, 0.1);
    }

    .phone-frame {
      width: 390px;
      max-width: 100%;
      height: 844px;
      background: #111827;
      border-radius: 42px;
      padding: 12px;
      box-shadow: 0 40px 90px rgba(9, 16, 29, 0.28);
      position: relative;
      z-index: 1;
    }

    .phone-notch {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 150px;
      height: 30px;
      border-radius: 0 0 20px 20px;
      background: #111827;
      z-index: 3;
    }

    .phone-screen {
      height: 100%;
      border-radius: 32px;
      overflow: hidden;
      background:
        linear-gradient(180deg, #edf4ff 0%, #f6f8fc 28%, #f6f7fb 100%);
      position: relative;
      border: 1px solid rgba(255, 255, 255, 0.45);
    }

    .status-bar {
      height: 44px;
      padding: 12px 22px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #fff;
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 2;
    }

    .status-bar span {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .signal {
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .signal i {
      display: block;
      width: 16px;
      height: 10px;
      border: 1.4px solid rgba(255, 255, 255, 0.8);
      border-radius: 3px;
      position: relative;
    }

    .signal i::after {
      content: "";
      position: absolute;
      top: 2px;
      right: -3px;
      width: 2px;
      height: 4px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.85);
    }

    .signal b {
      width: 18px;
      height: 10px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.82);
      display: block;
    }

    .screen-scroll {
      height: 100%;
      overflow-y: auto;
      padding-bottom: 98px;
    }

    .screen-scroll::-webkit-scrollbar {
      width: 0;
    }

    .hero {
      position: relative;
      padding: 56px 20px 28px;
      color: #fff;
      background: var(--gradient);
      overflow: hidden;
    }

    .hero::before,
    .hero::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
    }

    .hero::before {
      width: 160px;
      height: 160px;
      top: -44px;
      right: -28px;
    }

    .hero::after {
      width: 86px;
      height: 86px;
      bottom: 26px;
      right: 28px;
    }

    .hero-top {
      position: relative;
      z-index: 1;
    }

    .hero-mark {
      font-size: 12px;
      letter-spacing: 0.08em;
      opacity: 0.84;
      margin-bottom: 10px;
    }

    .hero-title {
      font-size: 30px;
      line-height: 1.14;
      font-weight: 800;
      max-width: 250px;
    }

    .hero-subtitle {
      margin-top: 12px;
      font-size: 14px;
      line-height: 1.65;
      color: rgba(255, 255, 255, 0.9);
      max-width: 272px;
    }

    .content {
      padding: 0 16px;
      margin-top: -26px;
      position: relative;
      z-index: 2;
    }

    .card {
      border-radius: 26px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 18px 36px rgba(26, 45, 80, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.8);
    }

    .focus-card {
      padding: 20px;
    }

    .focus-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    .pill::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    .pill.blue { background: rgba(47, 124, 246, 0.11); color: #2f7cf6; }
    .pill.green { background: rgba(24, 163, 109, 0.11); color: #129260; }
    .pill.orange { background: rgba(244, 161, 26, 0.12); color: #d88700; }
    .pill.red { background: rgba(239, 83, 80, 0.12); color: #d64240; }

    #alertLevel {
      flex: 0 0 auto;
      min-width: 92px;
      justify-content: center;
      padding: 10px 16px;
      border-radius: 999px;
      white-space: nowrap;
      background: rgba(255, 255, 255, 0.82);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.7);
    }

    #alertLevel::before {
      display: none;
    }

    #alertLevel.orange {
      color: #d88700;
      background: rgba(255, 248, 240, 0.96);
    }

    #alertLevel.red {
      color: #d64240;
      background: rgba(255, 244, 244, 0.96);
    }

    #alertLevel.blue {
      color: #2f7cf6;
      background: rgba(243, 248, 255, 0.96);
    }

    #alertLevel.green {
      color: #129260;
      background: rgba(242, 252, 247, 0.96);
    }

    .focus-card h2 {
      font-size: 22px;
      line-height: 1.3;
      letter-spacing: -0.02em;
    }

    .focus-card p {
      margin-top: 10px;
      color: var(--text-2);
      font-size: 14px;
      line-height: 1.7;
    }

    .alert-strip {
      margin-top: 16px;
      padding: 14px;
      border-radius: 20px;
      background: linear-gradient(135deg, rgba(47, 124, 246, 0.08), rgba(106, 168, 255, 0.14));
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .alert-strip strong {
      font-size: 14px;
      display: block;
      margin-bottom: 4px;
    }

    .alert-strip span {
      font-size: 13px;
      color: var(--text-2);
    }

    .focus-actions {
      display: grid;
      grid-template-columns: 1fr 124px;
      gap: 12px;
      margin-top: 18px;
    }

    .primary-btn,
    .secondary-btn {
      height: 50px;
      border-radius: 18px;
      font-size: 14px;
      font-weight: 700;
    }

    .primary-btn {
      color: #fff;
      background: var(--gradient);
      box-shadow: 0 12px 26px rgba(47, 124, 246, 0.22);
    }

    .secondary-btn {
      color: var(--accent);
      background: rgba(47, 124, 246, 0.08);
      border: 1px solid rgba(47, 124, 246, 0.12);
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 14px;
    }

    .stat-card {
      padding: 14px 12px 13px;
      border-radius: 20px;
      background: linear-gradient(180deg, #f8fbff, #f4f7fb);
      border: 1px solid rgba(16, 24, 40, 0.04);
    }

    .stat-card strong {
      display: block;
      font-size: 20px;
      margin-bottom: 4px;
    }

    .stat-card span {
      display: block;
      color: var(--text-3);
      font-size: 11px;
      line-height: 1.5;
    }

    .message-bar {
      margin-top: 14px;
      padding: 15px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.96);
      color: var(--text-1);
      box-shadow: 0 12px 28px rgba(26, 45, 80, 0.06);
    }

    .message-icon {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 16px;
      font-weight: 700;
      flex: 0 0 auto;
    }

    .message-content {
      flex: 1;
      min-width: 0;
    }

    .message-content strong {
      display: block;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .message-content p {
      color: var(--text-2);
      font-size: 12px;
      line-height: 1.6;
    }

    .message-count {
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(47, 124, 246, 0.08);
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
    }

    .section {
      margin-top: 14px;
      padding: 18px;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .section-head h3 {
      font-size: 17px;
      font-weight: 800;
    }

    .section-head span {
      font-size: 12px;
      color: var(--text-3);
    }

    .task-list,
    .skill-list,
    .trust-list {
      display: grid;
      gap: 12px;
    }

    .task-item,
    .skill-item,
    .trust-item {
      padding: 16px 15px;
      border-radius: 20px;
      background: linear-gradient(180deg, #fafcff, #f6f8fc);
      border: 1px solid rgba(16, 24, 40, 0.05);
    }

    .task-top,
    .skill-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
    }

    .task-priority {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.06em;
      color: var(--accent);
      margin-bottom: 7px;
    }

    .task-item h4,
    .skill-item h4,
    .trust-item h4 {
      font-size: 16px;
      line-height: 1.42;
    }

    .task-item p,
    .skill-item p,
    .trust-item p {
      color: var(--text-2);
      font-size: 13px;
      line-height: 1.65;
      margin-top: 6px;
    }

    .task-action,
    .skill-action {
      flex: 0 0 auto;
      padding: 9px 12px;
      border-radius: 14px;
      background: #fff;
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      box-shadow: 0 8px 16px rgba(24, 40, 72, 0.06);
    }

    .skill-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .mini-tag {
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(47, 124, 246, 0.08);
      color: var(--text-2);
      font-size: 11px;
    }

    .trust-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top: 14px;
    }

    .trust-badge {
      padding: 14px 12px;
      border-radius: 20px;
      background: linear-gradient(180deg, #f8fbff, #ffffff);
      border: 1px solid rgba(47, 124, 246, 0.08);
    }

    .trust-badge strong {
      display: block;
      font-size: 14px;
      margin-bottom: 8px;
    }

    .trust-badge span {
      color: var(--text-2);
      font-size: 12px;
      line-height: 1.6;
    }

    .service-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .entry-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .entry-item {
      padding: 16px 10px 14px;
      border-radius: 20px;
      text-align: center;
      background: linear-gradient(180deg, #fbfdff, #f4f8ff);
      border: 1px solid rgba(47, 124, 246, 0.08);
    }

    .entry-icon {
      width: 44px;
      height: 44px;
      margin: 0 auto 10px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, rgba(47, 124, 246, 0.14), rgba(106, 168, 255, 0.24));
      color: var(--accent);
      font-size: 14px;
      font-weight: 800;
    }

    .entry-item strong {
      display: block;
      font-size: 13px;
      line-height: 1.4;
    }

    .entry-item span {
      display: block;
      margin-top: 4px;
      color: var(--text-3);
      font-size: 11px;
      line-height: 1.45;
    }

    .service-item {
      padding: 16px 8px 14px;
      border-radius: 20px;
      text-align: center;
      background: linear-gradient(180deg, #fafcff, #f6f8fc);
      border: 1px solid rgba(16, 24, 40, 0.04);
    }

    .service-icon {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      margin: 0 auto 10px;
      background: linear-gradient(135deg, rgba(47, 124, 246, 0.14), rgba(106, 168, 255, 0.22));
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 800;
    }

    .service-item strong {
      display: block;
      font-size: 13px;
      line-height: 1.45;
    }

    .service-item span {
      display: block;
      font-size: 11px;
      color: var(--text-3);
      margin-top: 4px;
    }

    .bottom-tab {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 84px;
      padding: 12px 18px 24px;
      background: rgba(255, 255, 255, 0.96);
      border-top: 1px solid rgba(17, 24, 39, 0.06);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .tab-item {
      text-align: center;
      color: var(--text-3);
      font-size: 11px;
    }

    .tab-item .tab-icon {
      width: 28px;
      height: 28px;
      border-radius: 10px;
      margin: 0 auto 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(22, 32, 51, 0.05);
      font-weight: 800;
      font-size: 12px;
    }

    .tab-item.active {
      color: var(--accent);
      font-weight: 700;
    }

    .tab-item.active .tab-icon {
      background: var(--accent-soft);
      color: var(--accent);
    }

    @media (max-width: 1100px) {
      .app-shell {
        grid-template-columns: 1fr;
        height: auto;
      }

      .panel {
        position: static;
        max-height: none;
      }

      .phone-panel {
        min-height: unset;
        height: auto;
        position: relative;
        top: auto;
      }

      .panel-scroll {
        overflow: visible;
      }
    }

    @media (max-width: 540px) {
      body {
        padding: 12px;
      }

      .panel {
        padding: 18px;
        border-radius: 22px;
      }

      .phone-panel {
        padding: 10px;
        border-radius: 22px;
      }

      .phone-frame {
        width: 100%;
        height: 94vh;
        min-height: 760px;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="panel">
      <div class="eyebrow">HOME SCENES</div>
      <h1>首页场景预览</h1>
      <p class="intro">

    const scenarioList = document.getElementById("scenarioList");
    const scenarioHint = document.getElementById("scenarioHint");
    const scenarioCount = document.getElementById("scenarioCount");
    const nextScenarioBtn = document.getElementById("nextScenarioBtn");

    let currentIndex = 0;

    function buildScenarioSwitchers() {
      scenarioCount.textContent = `${scenarios.length} 个状态`;

      scenarioList.innerHTML = scenarios.map((item, index) => `
        <button class="scenario-btn${index === currentIndex ? " active" : ""}" data-index="${index}" type="button">
          <small>${item.short}</small>
          <strong>${item.label}</strong>
          <p>${item.summary}</p>
        </button>
      `).join("");

      document.querySelectorAll(".scenario-btn").forEach((node) => {
        node.addEventListener("click", () => setScenario(Number(node.dataset.index)));
      });
    }

    function renderStats(stats) {
      return stats.map((item) => `
        <div class="stat-card">
          <strong>${item.value}</strong>
          <span>${item.label}</span>
          <span>${item.note}</span>
        </div>
      `).join("");
    }

    function renderTasks(tasks) {
      return tasks.map((item) => `
        <div class="task-item">
          <div class="task-top">
            <div>
              <div class="task-priority">${item.priority}</div>
              <h4>${item.title}</h4>
              <p>${item.desc}</p>
            </div>
            <button type="button" class="task-action">${item.action}</button>
          </div>
        </div>
      `).join("");
    }

    function renderMiddleSection(middle) {
      if (middle.type === "trust") {
        return `
          <div class="trust-list">
            ${middle.items.map((item) => `
              <div class="trust-item">
                <h4>${item.title}</h4>
                <p>${item.desc}</p>
              </div>
            `).join("")}
          </div>
          <div class="trust-grid">
            ${middle.badges.map((item) => `
              <div class="trust-badge">
                <strong>${item.title}</strong>
                <span>${item.desc}</span>
              </div>
            `).join("")}
          </div>
        `;
      }

      return `
        <div class="skill-list">
          ${middle.items.map((item) => `
            <div class="skill-item">
              <div class="skill-top">
                <div>
                  <h4>${item.title}</h4>
                  <p>${item.desc}</p>
                </div>
                <button type="button" class="skill-action">${item.action}</button>
              </div>
              <div class="skill-meta">
                ${item.tags.map((tag) => `<span class="mini-tag">${tag}</span>`).join("")}
              </div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderServices(services) {
      return services.map((item) => `
        <div class="service-item">
          <div class="service-icon">${item.icon}</div>
          <strong>${item.title}</strong>
          <span>${item.note}</span>
        </div>
      `).join("");
    }

    function renderExtraSection(extra) {
      return `
        <div class="entry-grid">
          ${extra.items.map((item) => `
            <div class="entry-item">
              <div class="entry-icon">${item.icon}</div>
              <strong>${item.title}</strong>
              <span>${item.note}</span>
            </div>
          `).join("")}
        </div>
      `;
    }

    function setPill(el, config) {
      el.className = `pill ${config.tone}`;
      el.textContent = config.text;
    }

    function setScenario(index) {
      currentIndex = index;
      const data = scenarios[index];

      document.documentElement.style.setProperty("--accent", data.accent[0]);
      document.documentElement.style.setProperty("--accent-2", data.accent[1]);
      document.documentElement.style.setProperty("--accent-soft", hexToRgba(data.accent[0], 0.12));

      document.getElementById("heroMark").textContent = data.heroMark;
      document.getElementById("heroTitle").textContent = data.heroTitle;
      document.getElementById("heroSubtitle").textContent = data.heroSubtitle;

      setPill(document.getElementById("focusTag"), data.focusTag);
      document.getElementById("focusTitle").textContent = data.focusTitle;
      document.getElementById("focusDesc").textContent = data.focusDesc;

      document.getElementById("alertTitle").textContent = data.alert.title;
      document.getElementById("alertDesc").textContent = data.alert.desc;
      setPill(document.getElementById("alertLevel"), data.alert.level);

      document.getElementById("primaryAction").textContent = data.actions.primary;
      document.getElementById("secondaryAction").textContent = data.actions.secondary;
      document.getElementById("statsRow").innerHTML = renderStats(data.stats);

      document.getElementById("messageTitle").textContent = data.message.title;
      document.getElementById("messageDesc").textContent = data.message.desc;
      document.getElementById("messageCount").textContent = data.message.count;

      document.getElementById("taskList").innerHTML = renderTasks(data.tasks);
      document.getElementById("middleSectionTitle").textContent = data.middle.title;
      document.getElementById("middleSectionNote").textContent = data.middle.note;
      document.getElementById("middleSectionBody").innerHTML = renderMiddleSection(data.middle);

      const extraSection = document.getElementById("extraSection");
      if (data.extra) {
        extraSection.style.display = "block";
        document.getElementById("extraSectionTitle").textContent = data.extra.title;
        document.getElementById("extraSectionNote").textContent = data.extra.note;
        document.getElementById("extraSectionBody").innerHTML = renderExtraSection(data.extra);
      } else {
        extraSection.style.display = "none";
        document.getElementById("extraSectionBody").innerHTML = "";
      }

      document.getElementById("serviceGrid").innerHTML = renderServices(data.services);

      scenarioHint.textContent = data.tip;
      buildScenarioSwitchers();
    }

    function hexToRgba(hex, alpha) {
      const value = hex.replace("#", "");
      const chunk = value.length === 3
        ? value.split("").map((char) => char + char).join("")
        : value;
      const num = parseInt(chunk, 16);
      const r = (num >> 16) & 255;
      const g = (num >> 8) & 255;
      const b = num & 255;
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    nextScenarioBtn.addEventListener("click", () => {
      const next = (currentIndex + 1) % scenarios.length;
      setScenario(next);
    });

    setScenario(0);
